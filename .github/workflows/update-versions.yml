name: Update TeslaMate version

# Checks GitHub releases weekly; opens a PR when a new version is out.

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: arc-teslamate
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest TeslaMate release
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, re, os

          req = urllib.request.Request(
              "https://api.github.com/repos/adriankumpf/teslamate/releases/latest",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Accept": "application/vnd.github+json"}
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          # Release tag is like "v1.32.0" — strip the "v" for image tag
          latest_raw = data["tag_name"]
          latest = latest_raw.lstrip("v")

          with open("k8s/manifest.yaml") as f:
              content = f.read()
          m = re.search(r'image: teslamate/teslamate:(.+)', content)
          current = m.group(1) if m else "unknown"

          print(f"Current: {current}  Latest: {latest}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"latest={latest}\n")
              out.write(f"current={current}\n")
              out.write(f"changed={'true' if latest and latest != current else 'false'}\n")
          PYEOF

      - name: Update manifest
        if: steps.ver.outputs.changed == 'true'
        run: |
          sed -i "s|image: teslamate/teslamate:.*|image: teslamate/teslamate:${{ steps.ver.outputs.latest }}|g" k8s/manifest.yaml

      - name: Open PR
        if: steps.ver.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update/teslamate-${{ steps.ver.outputs.latest }}
          commit-message: "chore: update TeslaMate ${{ steps.ver.outputs.current }} → ${{ steps.ver.outputs.latest }}"
          title: "chore: update TeslaMate ${{ steps.ver.outputs.current }} → ${{ steps.ver.outputs.latest }}"
          body: |
            Automated update of TeslaMate image tag.

            - **From:** `${{ steps.ver.outputs.current }}`
            - **To:** `${{ steps.ver.outputs.latest }}`

            [TeslaMate releases](https://github.com/adriankumpf/teslamate/releases/tag/v${{ steps.ver.outputs.latest }})
          labels: dependencies
          delete-branch: true
