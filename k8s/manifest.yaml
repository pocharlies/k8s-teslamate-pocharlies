---
apiVersion: v1
kind: Namespace
metadata:
  name: teslamate
---
# TeslaMate — Tesla vehicle tracking
# Stack: teslamate-web + teslamate-mosquitto
# teslamate-grafana is codified below; it serves the upstream TeslaMate
# dashboards and connects to the shared Postgres database.
#
# Migration strategy (Phase 9):
#   1. pg_dump from docker teslamate-postgres → restore in CloudNativePG cluster
#   2. Mosquitto: copy persistence file (teslamate data is reconnected from Tesla API)
#   3. teslamate connects to MQTT broker by env var — service name transparent to app

# ExternalSecret: teslamate app secrets
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teslamate-secrets
  namespace: teslamate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: teslamate-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: secret/teslamate
---
# ── Mosquitto MQTT broker ─────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-data
  namespace: teslamate
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: longhorn
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: teslamate
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate-mosquitto
  namespace: teslamate
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: teslamate-mosquitto } }
  template:
    metadata: { labels: { app: teslamate-mosquitto } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        topology: lan
        kubernetes.io/arch: amd64
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - { name: mqtt, containerPort: 1883 }
          volumeMounts:
            - { name: config, mountPath: /mosquitto/config }
            - { name: data,   mountPath: /mosquitto/data }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { memory: 128Mi }
      volumes:
        - name: config
          configMap: { name: mosquitto-config }
        - name: data
          persistentVolumeClaim: { claimName: mosquitto-data }
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate-mosquitto
  namespace: teslamate
spec:
  selector: { app: teslamate-mosquitto }
  ports:
    - { name: mqtt, port: 1883, targetPort: 1883 }

# ── TeslaMate web ─────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate
  namespace: teslamate
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: teslamate } }
  template:
    metadata: { labels: { app: teslamate } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        topology: lan
        kubernetes.io/arch: amd64
      initContainers:
        # Wait for CloudNativePG to be ready
        - name: wait-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-shared-rw.databases.svc.cluster.local -p 5432; do
                echo "waiting for postgres..."; sleep 3; done
          env:
            - { name: PGPASSWORD, valueFrom: { secretKeyRef: { name: teslamate-secrets, key: DB_PASSWORD } } }
      containers:
        - name: teslamate
          image: teslamate/teslamate:3.0.0
          ports:
            - { name: http, containerPort: 4000 }
          env:
            # Use native teslamate DB env vars (avoid $(VAR) interpolation from envFrom)
            - name: DATABASE_USER
              valueFrom: { secretKeyRef: { name: teslamate-secrets, key: DB_USER } }
            - name: DATABASE_PASS
              valueFrom: { secretKeyRef: { name: teslamate-secrets, key: DB_PASSWORD } }
            - { name: DATABASE_NAME, value: "teslamate" }
            - { name: DATABASE_HOST, value: "postgres-shared-rw.databases.svc.cluster.local" }
            - name: ENCRYPTION_KEY
              valueFrom: { secretKeyRef: { name: teslamate-secrets, key: ENCRYPTION_KEY } }
            - { name: MQTT_HOST, value: "teslamate-mosquitto.teslamate.svc.cluster.local" }
            - { name: DISABLE_MQTT, value: "false" }
            - { name: TZ, value: "Europe/Madrid" }
            - name: TESLA_AUTH_CLIENT_ID
              valueFrom: { secretKeyRef: { name: teslamate-secrets, key: TESLA_AUTH_CLIENT_ID, optional: true } }
            - name: TESLA_AUTH_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: teslamate-secrets, key: TESLA_AUTH_CLIENT_SECRET, optional: true } }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 4000 }
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            tcpSocket: { port: 4000 }
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate
  namespace: teslamate
spec:
  selector: { app: teslamate }
  ports:
    - { name: http, port: 80, targetPort: 4000 }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: teslamate-lan
  namespace: teslamate
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`teslamate.lan.e-dani.com`)
      kind: Rule
      services:
        - name: teslamate
          port: 80
      middlewares:
        - { name: authelia, namespace: authelia }
  tls:
    store: { name: default, namespace: traefik-lan }
---
apiVersion: v1
kind: Namespace
metadata:
  name: teslamate-grafana
---
# ── TeslaMate Grafana dashboards ─────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teslamate-grafana-secrets
  namespace: teslamate-grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: teslamate-grafana-secrets
    # Merge into the pre-existing Secret so the manually seeded Grafana admin
    # password is preserved until Vault write policy allows storing it there.
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: DB_PASS
      remoteRef:
        key: secret/teslamate
        property: DB_PASSWORD
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teslamate-grafana-data
  namespace: teslamate-grafana
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate-grafana
  namespace: teslamate-grafana
spec:
  replicas: 1
  selector: { matchLabels: { app: teslamate-grafana } }
  template:
    metadata: { labels: { app: teslamate-grafana } }
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: teslamate/grafana:latest
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - { name: DATABASE_USER, value: "teslamate" }
            - { name: DATABASE_NAME, value: "teslamate" }
            - { name: DATABASE_HOST, value: "postgres-shared-rw.databases.svc.cluster.local" }
            - name: DATABASE_PASS
              valueFrom: { secretKeyRef: { name: teslamate-grafana-secrets, key: DB_PASS } }
            - { name: GF_SECURITY_ADMIN_USER, value: "admin" }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: teslamate-grafana-secrets, key: GF_ADMIN_PASS } }
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "false" }
            - { name: GF_SERVER_ROOT_URL, value: "https://teslamate.e-dani.com/grafana/" }
            - { name: GF_SERVER_SERVE_FROM_SUB_PATH, value: "true" }
            - { name: TZ, value: "Europe/Madrid" }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - { name: data, mountPath: /var/lib/grafana }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: teslamate-grafana-data }
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate-grafana
  namespace: teslamate-grafana
spec:
  selector: { app: teslamate-grafana }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
